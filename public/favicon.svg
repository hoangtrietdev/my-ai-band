<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#2c2c2e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a84ff"/>
      <stop offset="40%" stop-color="#34d399"/>
      <stop offset="75%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)" stroke="#48484a" stroke-width="1.5"/>
  <!-- Waveform bars (DAW equalizer style) -->
  <rect x="8"  y="34" width="4" height="10" rx="2" fill="url(#wave)" opacity="0.9"/>
  <rect x="14" y="28" width="4" height="16" rx="2" fill="url(#wave)" opacity="0.9"/>
  <rect x="20" y="20" width="4" height="24" rx="2" fill="url(#wave)" opacity="0.9"/>
  <rect x="26" y="14" width="4" height="30" rx="2" fill="url(#wave)" opacity="0.9"/>
  <rect x="32" y="18" width="4" height="26" rx="2" fill="url(#wave)" opacity="0.9"/>
  <rect x="38" y="24" width="4" height="20" rx="2" fill="url(#wave)" opacity="0.9"/>
  <rect x="44" y="30" width="4" height="14" rx="2" fill="url(#wave)" opacity="0.9"/>
  <rect x="50" y="34" width="4" height="10" rx="2" fill="url(#wave)" opacity="0.9"/>
</svg>
